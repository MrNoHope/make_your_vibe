<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07090c"/>
      <stop offset="1" stop-color="#101915"/>
    </linearGradient>
    <linearGradient id="greenCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#83ef72"/>
      <stop offset="1" stop-color="#0d2b20"/>
    </linearGradient>
    <linearGradient id="mintCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dcfff3"/>
      <stop offset="1" stop-color="#5fec75"/>
    </linearGradient>
    <linearGradient id="violetCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#252133"/>
      <stop offset="1" stop-color="#9dfc6d"/>
