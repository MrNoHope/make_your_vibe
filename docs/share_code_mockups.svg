      .darkText { font-family: Inter, Arial, sans-serif; font-weight: 900; fill: #061008; }
      .darkSub { font-family: Inter, Arial, sans-serif; font-weight: 700; fill: #183122; }
      .tiny { font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 800; letter-spacing: 1px; }
      .bar { fill: #050806; rx: 6; }
      .barLight { fill: #efffed; rx: 6; }
